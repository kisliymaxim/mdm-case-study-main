services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: mdm-app
    working_dir: /var/www/html
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    environment: &app-env
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: mdm
      DB_USERNAME: mdm
      DB_PASSWORD: mdm
      QUEUE_CONNECTION: redis
      QUEUE_FAILED_DRIVER: "null"
      CACHE_STORE: redis
      SESSION_DRIVER: array
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BROADCAST_CONNECTION: reverb
      # Reverb credentials sourced from the host .env (docker compose reads
      # ./.env automatically for ${VAR} substitution). Defaults match
      # .env.example so a fresh clone "just works" without env tweaking.
      REVERB_APP_ID: "${REVERB_APP_ID:-603204}"
      REVERB_APP_KEY: "${REVERB_APP_KEY:-92c66ec4ea0273b11ffa}"
      REVERB_APP_SECRET: "${REVERB_APP_SECRET:-b0590f9869ba2e39a945581ce3ea7818f116a18e}"
      REVERB_HOST: reverb
      REVERB_PORT: 8081
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8081
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      RUN_MIGRATIONS: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mdm

  web:
    image: nginx:1.27-alpine
    container_name: mdm-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - mdm

  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: mdm-queue
    working_dir: /var/www/html
    restart: unless-stopped
    command: php artisan queue:work redis --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mdm

  reverb:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: mdm-reverb
    working_dir: /var/www/html
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8081 --hostname=localhost
    volumes:
      - ./:/var/www/html
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    ports:
      - "8081:8081"
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - mdm

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: mdm-ui
    working_dir: /app
    restart: unless-stopped
    volumes:
      # Bind-mount only — no named volume for node_modules so the host IDE
      # (PHPStorm/VS Code) can see installed packages and resolve types.
      # Container installs Linux-arch binaries the host can't execute, but
      # IDEs only read .d.ts / .js for IntelliSense, which works fine.
      - ./ui:/app
    environment:
      VITE_API_URL: http://localhost:8080/api
      # Same Reverb key as the BE app-env block above; substitution from
      # host .env (or .env.example default) keeps the two sides in sync.
      VITE_REVERB_APP_KEY: "${REVERB_APP_KEY:-92c66ec4ea0273b11ffa}"
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: "8081"
      VITE_REVERB_SCHEME: http
    ports:
      - "5173:5173"
    networks:
      - mdm

  mysql:
    image: mysql:8.0
    container_name: mdm-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mdm
      MYSQL_USER: mdm
      MYSQL_PASSWORD: mdm
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mdm_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 3s
      timeout: 5s
      retries: 20
    networks:
      - mdm

  redis:
    image: redis:7-alpine
    container_name: mdm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - mdm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - mdm

volumes:
  mdm_mysql_data:
  mdm_redis_data:

networks:
  mdm:
    driver: bridge
